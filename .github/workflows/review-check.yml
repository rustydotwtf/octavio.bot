name: review-check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install OpenCode CLI (best effort)
        continue-on-error: true
        run: |
          curl --retry 5 --retry-delay 2 --retry-all-errors -fsSL https://opencode.ai/install | bash
          if [ -d "$HOME/.opencode/bin" ]; then
            echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"
          fi
          if [ -d "$HOME/.local/bin" ]; then
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Verify OpenCode CLI
        run: |
          if command -v opencode > /dev/null; then
            opencode --version
          elif [ -x "$HOME/.opencode/bin/opencode" ]; then
            "$HOME/.opencode/bin/opencode" --version
          else
            echo "OpenCode CLI was not found after install; continuing because SDK path is used by the review runner."
          fi

      - name: Locate previous findings artifact
        id: previous-artifact
        uses: actions/github-script@v7
        with:
          script: |
            if (!context.payload.pull_request) {
              core.setOutput("run_id", "")
              core.setOutput("artifact_name", "")
              return
            }

            const artifactName = `octavio-findings-pr-${context.payload.pull_request.number}`
            const { owner, repo } = context.repo

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              {
                owner,
                repo,
                event: "pull_request",
                per_page: 100,
              }
            )

            for (const run of runs) {
              if (run.id === context.runId || run.status !== "completed") {
                continue
              }

              const artifacts = await github.paginate(
                github.rest.actions.listWorkflowRunArtifacts,
                {
                  owner,
                  repo,
                  run_id: run.id,
                  per_page: 100,
                }
              )

              const match = artifacts.find(
                (artifact) => artifact.name === artifactName && !artifact.expired
              )

              if (!match) {
                continue
              }

              core.setOutput("run_id", String(run.id))
              core.setOutput("artifact_name", artifactName)
              return
            }

            core.setOutput("run_id", "")
            core.setOutput("artifact_name", "")

      - name: Download previous findings artifact
        if: steps.previous-artifact.outputs.run_id != ''
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          name: ${{ steps.previous-artifact.outputs.artifact_name }}
          path: .previous-findings
          repository: ${{ github.repository }}
          run-id: ${{ steps.previous-artifact.outputs.run_id }}

      - name: Run review check
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPENCODE_HOSTNAME: ${{ vars.OPENCODE_HOSTNAME || '127.0.0.1' }}
          OPENCODE_MODEL: ${{ vars.OPENCODE_MODEL || 'opencode/minimax-m2.5-free' }}
          OPENCODE_PORT: ${{ vars.OPENCODE_PORT || '4096' }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          mkdir -p artifacts
          PREVIOUS_ARGS=""
          if [ -f ".previous-findings/findings.json" ]; then
            PREVIOUS_ARGS="--previous-findings .previous-findings/findings.json"
          fi
          bun run review-bot \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --instructions prompts/code-review.md \
            --workdir . \
            --report-output artifacts/report.md \
            --findings-output artifacts/findings.json \
            --result-output artifacts/result.json \
            $PREVIOUS_ARGS

      - name: Publish job summary
        if: always()
        run: |
          if [ -f artifacts/result.json ]; then
            bun -e 'const result = await Bun.file("artifacts/result.json").json();
            const lines = [
              "## Octavio Review",
              "",
              `- Blocking findings: ${result.hasBlockingFindings ? "yes" : "no"}`,
              `- New findings: ${result.comparison.new}`,
              `- Persisting findings: ${result.comparison.persisting}`,
              `- Resolved findings: ${result.comparison.resolved}`,
              `- Policy source: ${result.policy.source}`,
              `- Policy rules: ${result.policy.failOnRules.join(", ") || "none"}`,
              `- Matched rules: ${result.policy.matchedRules.join(", ") || "none"}`,
              "",
              "### Summary",
              result.summary,
            ];
            if (Array.isArray(result.policy.warnings) && result.policy.warnings.length > 0) {
              lines.push("", "### Policy Warnings", ...result.policy.warnings.map((warning) => `- ${warning}`));
            }
            await Bun.write(Bun.stdout, `${lines.join("\n")}\n`);' >> "$GITHUB_STEP_SUMMARY"
          else
            printf '## Octavio Review\n\nRun failed before report generation.\n' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: octavio-review-report-pr-${{ github.event.pull_request.number }}
          path: artifacts/report.md
          if-no-files-found: ignore

      - name: Upload findings artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: octavio-findings-pr-${{ github.event.pull_request.number }}
          path: artifacts/findings.json
          if-no-files-found: ignore

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: octavio-result-pr-${{ github.event.pull_request.number }}
          path: artifacts/result.json
          if-no-files-found: ignore
