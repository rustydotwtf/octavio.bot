name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        type: boolean
        default: false

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - run: bun install --frozen-lockfile

      - name: Check
        run: bun run check

  publish:
    needs: ci
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write
      id-token: write # Required for OIDC
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - name: Configure git
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version (workflow_dispatch)
        working-directory: apps/review-bot-cli
        run: |
          npm version ${{ inputs.version }} --workspaces=false -m "Release %s"
          node -e 'const v = require("./package.json").version; process.stdout.write(`NEW_VERSION=${v}\n`)' >> "$GITHUB_ENV"

      - name: Push version bump
        if: inputs.dry_run == false
        run: git push --follow-tags

      - name: Publish to npm
        if: inputs.dry_run != true
        working-directory: apps/review-bot-cli
        run: npm publish --access public --tag latest

      - name: Dry run - show what would be published
        if: inputs.dry_run == true
        working-directory: apps/review-bot-cli
        run: |
          echo "=== DRY RUN ==="
          echo "Version: ${{ env.NEW_VERSION }}"
          echo ""
          echo "=== Package contents ==="
          npm pack --dry-run
