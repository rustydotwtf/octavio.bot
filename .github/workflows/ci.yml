name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify generated workspace artifacts are in sync
        run: |
          bun run sync
          if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
            git status --short
            printf 'Generated artifacts are out of sync. Run `bun run sync` and commit the resulting changes.\n' >&2
            exit 1
          fi

      - name: Lint
        run: bun run check

      - name: Build
        run: bun run build

      - name: Test
        run: |
          if git ls-files | grep -E '(\.test|\.spec|_test_|_spec_)\.(js|ts|jsx|tsx)$' > /dev/null; then
            bun run test
          else
            echo "No test files found; skipping tests."
          fi

  published-cli-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Smoke test published CLI
        run: bunx --bun @octavio.bot/review@latest doctor
